<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — UniPresence Pro | IUE</title>

  <!-- Anti-flash dark mode -->
  <script>
    const t = localStorage.getItem('theme') ||
      (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    if (t === 'dark') document.documentElement.classList.add('dark');
  </script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="/assets/css/variables.css">
  <link rel="stylesheet" href="/assets/css/base.css">
  <link rel="stylesheet" href="/assets/css/animations.css">
  <link rel="icon" href="/assets/images/logo-iue.ico" type="image/x-icon">
  <link rel="icon" href="/assets/images/favicon.svg" type="image/svg+xml">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bleu-iue: #1A3A6B;
      --bleu-dark: #0D2040;
      --bleu-mid: #2D5AA8;
      --or-iue: #C8A84B;
      --vert: #16A34A;
      --rouge: #DC2626;
      --radius: 14px;
    }

    html, body {
      min-height: 100vh;
      font-family: 'DM Sans', system-ui, sans-serif;
    }

    body {
      background: linear-gradient(135deg, var(--bleu-iue) 0%, var(--bleu-dark) 60%, #06101F 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      position: relative;
      overflow: hidden;
    }

    /* Décoration fond */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      opacity: .08;
      pointer-events: none;
    }
    body::before {
      width: 600px; height: 600px;
      background: radial-gradient(circle, var(--or-iue), transparent 70%);
      top: -200px; right: -200px;
    }
    body::after {
      width: 400px; height: 400px;
      background: radial-gradient(circle, var(--bleu-mid), transparent 70%);
      bottom: -150px; left: -100px;
    }

    /* ─── Theme toggle coin ─── */
    .theme-toggle-fixed {
      position: fixed;
      top: 1rem;
      right: 1rem;
      background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 8px;
      padding: 6px 10px;
      cursor: pointer;
      font-size: 1.1rem;
      backdrop-filter: blur(4px);
      z-index: 100;
      transition: background .2s;
    }
    .theme-toggle-fixed:hover { background: rgba(255,255,255,.2); }

    /* ─── Carte login ─── */
    .login-card {
      position: relative;
      z-index: 10;
      background: #FFFFFF;
      border-radius: var(--radius);
      padding: 2.5rem 2.25rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 25px 60px rgba(0,0,0,.35), 0 0 0 1px rgba(255,255,255,.05);
      animation: cardIn .5s cubic-bezier(.22,1,.36,1) both;
    }
    html.dark .login-card {
      background: #161B22;
      box-shadow: 0 25px 60px rgba(0,0,0,.6), 0 0 0 1px rgba(255,255,255,.06);
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(24px) scale(.97); }
      to   { opacity: 1; transform: translateY(0)    scale(1); }
    }

    /* ─── Header carte ─── */
    .card-header {
      text-align: center;
      margin-bottom: 2rem;
    }
    .card-logo {
      width: 68px;
      height: 68px;
      background: linear-gradient(135deg, var(--bleu-iue), var(--bleu-mid));
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.25rem;
      font-size: 2rem;
      box-shadow: 0 8px 24px rgba(26,58,107,.35);
    }
    .card-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.7rem;
      font-weight: 700;
      color: var(--or-iue);
      margin-bottom: .3rem;
    }
    .card-subtitle {
      font-size: .85rem;
      color: #64748B;
      font-weight: 500;
    }
    html.dark .card-subtitle { color: #8B949E; }

    /* ─── Formulaire ─── */
    .form-group {
      margin-bottom: 1.25rem;
    }
    .form-label {
      display: block;
      font-size: .82rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: .45rem;
      letter-spacing: .02em;
    }
    html.dark .form-label { color: #CDD9E5; }

    .input-wrapper {
      position: relative;
    }
    .form-control {
      width: 100%;
      padding: .7rem 1rem;
      border: 1.5px solid #E5E7EB;
      border-radius: 9px;
      font-family: 'DM Sans', sans-serif;
      font-size: .92rem;
      background: #F9FAFB;
      color: #111827;
      transition: border-color .2s, box-shadow .2s, background .2s;
      outline: none;
    }
    html.dark .form-control {
      background: #0D1117;
      border-color: #30363D;
      color: #E6EDF3;
    }
    .form-control:focus {
      border-color: var(--bleu-iue);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(26,58,107,.12);
    }
    html.dark .form-control:focus {
      border-color: var(--or-iue);
      background: #161B22;
      box-shadow: 0 0 0 3px rgba(200,168,75,.15);
    }
    .form-control::placeholder { color: #9CA3AF; }

    /* ─── Toggle password ─── */
    .pwd-toggle {
      position: absolute;
      right: .8rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      color: #9CA3AF;
      line-height: 1;
      transition: color .2s;
    }
    .pwd-toggle:hover { color: var(--bleu-iue); }
    html.dark .pwd-toggle:hover { color: var(--or-iue); }
    .pwd-toggle svg { display: block; }
    .form-control.has-toggle { padding-right: 2.8rem; }

    /* ─── Erreur ─── */
    .error-msg {
      display: none;
      background: #FEF2F2;
      border: 1px solid #FECACA;
      color: var(--rouge);
      border-radius: 8px;
      padding: .65rem .9rem;
      font-size: .84rem;
      font-weight: 500;
      margin-bottom: 1rem;
      align-items: center;
      gap: 6px;
    }
    html.dark .error-msg {
      background: rgba(220,38,38,.1);
      border-color: rgba(220,38,38,.3);
    }
    .error-msg.show { display: flex; }

    /* ─── Bouton submit ─── */
    .btn-submit {
      width: 100%;
      padding: .8rem;
      background: linear-gradient(135deg, var(--bleu-iue), var(--bleu-mid));
      color: #fff;
      border: none;
      border-radius: 9px;
      font-family: 'DM Sans', sans-serif;
      font-size: .95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: .5rem;
    }
    .btn-submit:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(26,58,107,.35);
    }
    .btn-submit:disabled {
      opacity: .65;
      cursor: not-allowed;
    }

    /* ─── Spinner ─── */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }

    /* ─── Footer carte ─── */
    .card-footer {
      text-align: center;
      margin-top: 1.75rem;
      padding-top: 1.25rem;
      border-top: 1px solid #F1F5F9;
      font-size: .78rem;
      color: #9CA3AF;
    }
    html.dark .card-footer { border-color: #21262D; }

    /* ─── Back link ─── */
    .back-link {
      position: fixed;
      top: 1rem;
      left: 1rem;
      color: rgba(255,255,255,.65);
      text-decoration: none;
      font-size: .85rem;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color .2s;
    }
    .back-link:hover { color: rgba(255,255,255,.95); }
  </style>
</head>
<body>

  <a href="/" class="back-link">← Retour à l'accueil</a>

  <button class="theme-toggle-fixed" id="themeToggle" aria-label="Changer le thème">🌙</button>

  <!-- ═══════════ CARTE DE CONNEXION ═══════════ -->
  <div class="login-card" role="main">

    <!-- Header -->
    <div class="card-header">
      <div class="card-logo">
        <!-- Logo IUE avec fallback WebP → PNG → SVG inline -->
        <picture>
          <source srcset="/assets/images/logo-iue.webp" type="image/webp">
          <img src="/assets/images/logo-iue.png" alt="IUE" width="40" height="40"
               onerror="this.outerHTML='<svg width=\'40\' height=\'40\' viewBox=\'0 0 40 40\' fill=\'none\' xmlns=\'http://www.w3.org/2000/svg\'><circle cx=\'20\' cy=\'20\' r=\'20\' fill=\'%23C8A84B\' opacity=\'.2\'/><text x=\'20\' y=\'26\' text-anchor=\'middle\' font-size=\'20\' fill=\'%23C8A84B\'>🎓</text></svg>'">
        </picture>
      </div>
      <h1 class="card-title">UniPresence Pro</h1>
      <p class="card-subtitle">Espace Administration IUE</p>
    </div>

    <!-- Message d'erreur -->
    <div class="error-msg" id="error-msg" role="alert">
      <span>⚠️</span>
      <span id="error-text">Identifiants incorrects</span>
    </div>

    <!-- Formulaire -->
    <form id="login-form" novalidate>

      <div class="form-group">
        <label class="form-label" for="email">Adresse email</label>
        <input
          type="email"
          id="email"
          name="email"
          class="form-control"
          placeholder="admin@iue.cm"
          autocomplete="email"
          required
        >
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Mot de passe</label>
        <div class="input-wrapper">
          <input
            type="password"
            id="password"
            name="password"
            class="form-control has-toggle"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          >
          <button type="button" class="pwd-toggle" id="pwdToggle" aria-label="Afficher/masquer le mot de passe">
            <!-- Oeil ouvert -->
            <svg id="eye-open" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <!-- Oeil barré (caché par défaut) -->
            <svg id="eye-closed" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
              <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
      </div>

      <button type="submit" class="btn-submit" id="submit-btn">
        <span id="btn-text">Se connecter</span>
      </button>

    </form>

    <!-- Footer carte -->
    <div class="card-footer">
      Institut Universitaire de l'Entrepreneuriat — Douala<br>
      <span style="font-family:'JetBrains Mono',monospace;font-size:.72rem;opacity:.7;">UniPresence Pro v1.0</span>
    </div>
  </div>

  <!-- Scripts -->
  <script src="/assets/js/theme.js"></script>
  <script src="/assets/js/api.js"></script>

  <script>
    // ─── Theme toggle ───────────────────────────────
    const themeBtn = document.getElementById('themeToggle');
    themeBtn.addEventListener('click', () => {
      const isDark = document.documentElement.classList.toggle('dark');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
      themeBtn.textContent = isDark ? '☀️' : '🌙';
    });
    if (document.documentElement.classList.contains('dark')) {
      themeBtn.textContent = '☀️';
    }

    // ─── Toggle visibilité mot de passe ─────────────
    const pwdInput  = document.getElementById('password');
    const pwdBtn    = document.getElementById('pwdToggle');
    const eyeOpen   = document.getElementById('eye-open');
    const eyeClosed = document.getElementById('eye-closed');

    pwdBtn.addEventListener('click', () => {
      const isVisible = pwdInput.type === 'text';
      pwdInput.type       = isVisible ? 'password' : 'text';
      eyeOpen.style.display   = isVisible ? 'block' : 'none';
      eyeClosed.style.display = isVisible ? 'none'  : 'block';
    });

    // ─── Formulaire de connexion ─────────────────────
    const form      = document.getElementById('login-form');
    const submitBtn = document.getElementById('submit-btn');
    const btnText   = document.getElementById('btn-text');
    const errorDiv  = document.getElementById('error-msg');
    const errorText = document.getElementById('error-text');

    function showError(msg) {
      errorText.textContent = msg || 'Identifiants incorrects';
      errorDiv.classList.add('show');
    }
    function hideError() {
      errorDiv.classList.remove('show');
    }

    function setLoading(loading) {
      submitBtn.disabled = loading;
      if (loading) {
        btnText.innerHTML = '';
        const spinner = document.createElement('span');
        spinner.className = 'spinner';
        submitBtn.appendChild(spinner);
        submitBtn.appendChild(Object.assign(document.createElement('span'), { textContent: 'Connexion...' }));
      } else {
        submitBtn.innerHTML = '';
        submitBtn.appendChild(Object.assign(document.createElement('span'), { id: 'btn-text', textContent: 'Se connecter' }));
      }
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();

      const emailVal = document.getElementById('email').value.trim();
      const passVal  = document.getElementById('password').value;

      if (!emailVal || !passVal) {
        showError('Veuillez remplir tous les champs.');
        return;
      }

      setLoading(true);

      try {
        // Utiliser l'objet api si disponible, sinon fetch direct
        let res;
        if (typeof api !== 'undefined' && api.login) {
          res = await api.login(emailVal, passVal);
        } else {
          const resp = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: emailVal, mot_de_passe: passVal })
          });
          res = await resp.json();
        }

        if (res && res.succes) {
          window.location.href = '/dashboard';
        } else {
          showError(res?.message || 'Identifiants incorrects. Vérifiez votre email et mot de passe.');
        }
      } catch (err) {
        showError(err.message || 'Erreur de connexion. Vérifiez votre connexion réseau.');
      } finally {
        setLoading(false);
      }
    });

    // Effacer l'erreur à la saisie
    document.getElementById('email').addEventListener('input', hideError);
    document.getElementById('password').addEventListener('input', hideError);
  </script>
</body>
</html>
